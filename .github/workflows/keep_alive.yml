name: Keep Render Awake
on:
  schedule:
    - cron: '*/14 * * * *' # Every 14 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://astrojob.onrender.com/health || echo "Ping failed"
